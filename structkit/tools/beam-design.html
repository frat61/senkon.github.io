<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steel Beam Preliminary Design Tool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
:root {
  --bg:#f5f6f8;--bg2:#fff;--bg3:#f0f1f4;--bg4:#e8eaef;
  --border:#d4d7e0;--border2:#c0c4d0;
  --text:#1a1d2b;--text2:#4a4f65;--text3:#7a7f95;
  --accent:#2563eb;--accent-bg:rgba(37,99,235,0.08);
  --green:#059669;--green-bg:rgba(5,150,105,0.08);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.06);
  --orange:#d97706;--orange-bg:rgba(217,119,6,0.08);
  --cat-D:#2563eb;--cat-L:#d97706;--cat-S:#059669;--cat-W:#dc2626;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px;}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.header h1{font-size:17px;font-weight:700;color:var(--accent);}
.header .sub{font-size:10px;color:var(--text3);margin-top:1px;}
.layout{display:grid;grid-template-columns:350px 1fr;min-height:calc(100vh - 50px);}
.panel{background:var(--bg2);border-right:1px solid var(--border);padding:16px;overflow-y:auto;max-height:calc(100vh - 50px);}
.results{padding:16px;overflow-y:auto;max-height:calc(100vh - 50px);}
.sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.sec-title .dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.row.r3{grid-template-columns:1fr 1fr 1fr;}
.row:last-child{margin-bottom:0;}
label{display:block;font-size:10px;font-weight:600;color:var(--text2);margin-bottom:3px;text-transform:uppercase;letter-spacing:0.4px;}
input,select{width:100%;padding:7px 9px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;outline:none;}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg);}
select{cursor:pointer;}
.btn{padding:9px 16px;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-weight:600;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;}
.btn-primary{background:var(--accent);color:#fff;width:100%;justify-content:center;padding:11px;font-size:13px;}
.btn-primary:hover{background:#1d4ed8;}
.btn-add{background:var(--accent-bg);color:var(--accent);border:1px dashed var(--accent);width:100%;justify-content:center;padding:6px;font-size:11px;margin-top:6px;}
.btn-sm{padding:3px 7px;font-size:10px;border-radius:4px;}
.btn-rm{background:var(--red-bg);color:var(--red);}
.load-entry{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:6px;}
.load-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.tag{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;text-transform:uppercase;}
.tag.D{background:rgba(37,99,235,0.1);color:var(--cat-D);}
.tag.L{background:rgba(217,119,6,0.1);color:var(--cat-L);}
.tag.S{background:rgba(5,150,105,0.1);color:var(--cat-S);}
.tag.W{background:rgba(220,38,38,0.1);color:var(--cat-W);}
.sw-row{padding:8px 10px;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;}
.sw-row input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);}
.sw-row label{margin:0;text-transform:none;font-size:12px;color:var(--text);font-weight:500;cursor:pointer;}
.diagram-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:12px;}
.rec-card{background:linear-gradient(135deg,rgba(37,99,235,0.04),rgba(5,150,105,0.03));border:1px solid rgba(37,99,235,0.2);border-radius:10px;padding:16px;margin-bottom:12px;position:relative;}
.rec-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--accent),var(--green));border-radius:3px 0 0 3px;}
.rec-badge{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--green);margin-bottom:6px;}
.rec-name{font-size:22px;font-weight:700;margin-bottom:2px;}
.rec-sub{font-size:11px;color:var(--text2);margin-bottom:12px;}
.rec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.rec-stat{text-align:center;}
.rec-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;}
.rec-stat-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;}
.ubar-wrap{width:100%;height:5px;background:var(--bg4);border-radius:3px;margin-top:3px;overflow:hidden;}
.ubar{height:100%;border-radius:3px;}
.summary-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.scard.hl{border-color:var(--accent);background:var(--accent-bg);}
.scard-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.scard-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);}
.scard-unit{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);}
.combo-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px;}
.combo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px;margin-top:8px;}
.combo-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:11px;}
.combo-card.gov{border-color:var(--accent);background:var(--accent-bg);}
.combo-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text2);}
.combo-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:600;}
.tbl-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.tbl-hdr{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.tbl-hdr h3{font-size:13px;font-weight:700;}
.tbl-cnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);background:var(--bg3);padding:2px 6px;border-radius:3px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead{background:var(--bg3);position:sticky;top:0;z-index:2;}
th{padding:7px 8px;text-align:right;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;}
th:first-child,th:nth-child(2){text-align:left;}
td{padding:7px 8px;border-bottom:1px solid var(--bg4);font-family:'JetBrains Mono',monospace;font-size:11px;text-align:right;}
td:first-child,td:nth-child(2){text-align:left;}
tr{cursor:pointer;transition:background .1s;}
tr:hover td{background:var(--bg3);}
tr.sel td{background:var(--accent-bg);}
.badge{display:inline-flex;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;}
.badge.ok{background:var(--green-bg);color:var(--green);}
.badge.fail{background:var(--red-bg);color:var(--red);}
.calc-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:12px;}
.calc-block{background:var(--bg3);border-radius:6px;padding:10px;margin-bottom:10px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.7;color:var(--text2);}
.calc-block h4{font-family:'Inter',sans-serif;font-size:12px;font-weight:700;color:var(--text);margin-bottom:6px;}
.calc-block .hl{background:var(--accent-bg);padding:5px 8px;border-radius:4px;margin-top:6px;}
.empty{text-align:center;padding:40px;color:var(--text3);}
.empty h3{font-size:15px;color:var(--text2);margin-bottom:4px;}
.collapsible{cursor:pointer;user-select:none;}
.combo-editor{display:none;margin-bottom:12px;}
.combo-editor .ce-row{display:flex;gap:3px;align-items:center;margin-bottom:3px;font-size:10px;flex-wrap:wrap;}
.combo-editor input{padding:3px 4px;font-size:10px;width:40px;}
.combo-editor input.ce-name{width:100px;}
@media(max-width:900px){.layout{grid-template-columns:1fr;}.panel{max-height:none;border-right:none;border-bottom:1px solid var(--border);}.results{max-height:none;}.summary-cards,.rec-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:480px){
  body{font-size:14px;}
  .header{padding:10px 14px;}
  .header h1{font-size:15px;}
  .panel,.results{padding:12px;}
  input,select{padding:10px;font-size:13px;border-radius:8px;}
  label{font-size:11px;margin-bottom:4px;}
  .row{gap:8px;margin-bottom:10px;}
  .row.r3{grid-template-columns:1fr 1fr;gap:8px;}
  .btn-primary{padding:14px;font-size:14px;border-radius:10px;}
  .btn-add{padding:10px;font-size:12px;}
  .load-entry{padding:12px;}
  .card{padding:14px;}
  .rec-name{font-size:20px;}
  .rec-grid{grid-template-columns:1fr 1fr;}
  .summary-cards{grid-template-columns:1fr;}
  .sec-title{font-size:11px;}
  .diagram-wrap canvas{height:180px;}
  .tag{font-size:10px;padding:3px 8px;}
}
@media print{.panel,.header{display:none!important;}.layout{grid-template-columns:1fr;}.results{max-height:none;padding:8px;}}
</style>
</head>
<body>
<div class="header">
  <div><h1>Steel Beam Preliminary Design</h1><div class="sub">ASCE 7 LRFD — Deflection, Bending & Shear</div></div>
</div>
<div class="layout">
<div class="panel">
  <div class="sec-title"><span class="dot"></span>Beam Properties</div>
  <div class="card">
    <div class="row"><div><label>Span (m)</label><input type="number" id="iSpan" value="6" step="0.1" min="0.1" oninput="drawBeam()"></div>
    <div><label>Support Type</label><select id="iSup" onchange="drawBeam()"><option value="simply_supported">Simply Supported</option><option value="cantilever">Cantilever</option></select></div></div>
    <div class="row"><div><label>Deflection Limit</label><select id="iDefl"><option value="240">L/240</option><option value="300">L/300</option><option value="360" selected>L/360</option><option value="480">L/480</option><option value="custom">Custom</option></select></div>
    <div id="customDeflW" style="display:none"><label>Custom (L/?)</label><input type="number" id="iDeflC" value="400" min="1"></div></div>
    <div class="row"><div><label>E Modulus (MPa)</label><input type="number" id="iE" value="210000" step="1000"></div>
    <div><label>Steel Grade</label><select id="iFy"><option value="235">S235 / A36</option><option value="275" selected>S275 / A572-50</option><option value="355">S355 / A992</option><option value="460">S460</option></select></div></div>
    <div class="row"><div><label>Section Database</label><select id="iDB"><option value="all">All Sections</option><option value="IPE">IPE</option><option value="HEA">HEA</option><option value="HEB">HEB</option><option value="UB">UB</option><option value="UC">UC</option><option value="W">W Shapes</option></select></div><div></div></div>
  </div>
  <div class="sec-title"><span class="dot" style="background:var(--orange)"></span>Applied Loads</div>
  <div class="card"><div id="loadsCont"></div><button class="btn btn-add" onclick="addLoad()">+ Add Load</button></div>
  <div class="sw-row"><input type="checkbox" id="iSW" checked><div><label for="iSW">Include beam self-weight</label><div style="font-size:9px;color:var(--text3)">Iterative — adds section weight as Dead (D)</div></div></div>
  <div class="sec-title collapsible" onclick="toggleComboEditor()"><span class="dot" style="background:var(--red)"></span>Load Combinations (click to edit)</div>
  <div class="combo-editor" id="comboEditor">
    <div class="card" style="padding:8px"><div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px">Service Combos (D,L,S,W)</div><div id="svcComboList"></div><button class="btn btn-add" onclick="addCombo('svc')" style="font-size:9px;padding:4px">+ Add</button></div>
    <div class="card" style="padding:8px;margin-top:6px"><div style="font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:4px">LRFD Combos (D,L,S,W)</div><div id="lrfdComboList"></div><button class="btn btn-add" onclick="addCombo('lrfd')" style="font-size:9px;padding:4px">+ Add</button></div>
    <button class="btn btn-sm" style="margin-top:4px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);width:100%;justify-content:center;padding:5px" onclick="resetCombos()">Reset to ASCE 7 Defaults</button>
  </div>
  <button class="btn btn-primary" onclick="calculate()">Calculate & Design</button>
</div>
<div class="results" id="resPanel">
  <div class="diagram-wrap"><svg id="beamSVG" viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <div class="empty" id="emptyMsg"><h3>Ready to Design</h3><p>Configure beam, add loads, then Calculate.</p></div>
  <div id="resContent" style="display:none"></div>
</div>
</div>

// --- Deflection (returns mm) ---
// Simply Supported: UDL: 5wL⁴/(384EI), Pt mid: PL³/(48EI), Pt any: Pa(3L²-4a²)/(48EI)
// Cantilever: UDL: wL⁴/(8EI), Pt tip: PL³/(3EI), Pt any from fixed: Pa²(3L-a)/(6EI)
function deflUDL(w,L,E,I,sup){
  if(sup==='cantilever') return w*Math.pow(L,4)/(8*E*I);
  return(5*w*Math.pow(L,4))/(384*E*I);
}
function deflPtMid(P,L,E,I,sup){
  if(sup==='cantilever') return P*1000*Math.pow(L,3)/(3*E*I); // tip load
  return(P*1000*Math.pow(L,3))/(48*E*I);
}
function deflPtAny(P,a,L,E,I,sup){
  if(sup==='cantilever'){
    // a = distance from fixed end, deflection at free end
    return P*1000*a*a*(3*L-a)/(6*E*I);
  }
  const u=Math.min(a,L-a);
  return(P*1000*u*(3*L*L-4*u*u))/(48*E*I);
}

// --- Moment (returns kNm) ---
function momUDL(w,L,sup){
  if(sup==='cantilever') return w*L*L/2; // at fixed end
  return w*L*L/8;
}
function momPtMid(P,L,sup){
  if(sup==='cantilever') return P*L; // tip load, moment at fixed end
  return P*L/4;
}
function momPtAny(P,a,L,sup){
  if(sup==='cantilever') return P*a; // moment at fixed end = P × a
  return P*a*(L-a)/L;
}

function shrPtMid(P,sup){return sup==='cantilever'?P:P/2;}
function shrPtAny(P,a,L,sup){
  if(sup==='cantilever') return P;
  return Math.max(P*(L-a)/L,P*a/L);
}

function cDefl(l,Lmm,E,I,sup){
  if(l.type==='udl')return deflUDL(l.value,Lmm,E,I,sup);
  if(l.type==='point_mid')return deflPtMid(l.value,Lmm,E,I,sup);
  if(l.type==='point_any')return deflPtAny(l.value,l.pos*1000,Lmm,E,I,sup);return 0;}
function cMom(l,Lm,sup){
  if(l.type==='udl')return momUDL(l.value,Lm,sup);
  if(l.type==='point_mid')return momPtMid(l.value,Lm,sup);
  if(l.type==='point_any')return momPtAny(l.value,l.pos,Lm,sup);return 0;}
function cShr(l,Lm,sup){
  if(l.type==='udl')return shrUDL(l.value,Lm,sup);
  if(l.type==='point_mid')return shrPtMid(l.value,sup);
  if(l.type==='point_any')return shrPtAny(l.value,l.pos,Lm,sup);return 0;}

function applyCombo(combo,loads,Lmm,Lm,E,I,sup){
  let d=0,m=0,v=0;
  loads.forEach(l=>{const f=combo.f[l.cat]||0;if(!f||!l.value)return;const fl={...l,value:l.value*f};d+=cDefl(fl,Lmm,E,I,sup);m+=cMom(fl,Lm,sup);v+=cShr(fl,Lm,sup);});
  return{d,m,v};}

// ===== UI: Beam Diagram =====
function drawBeam(){
  const svg=document.getElementById('beamSVG');
  const span=parseFloat(document.getElementById('iSpan').value)||6;
  const sup=getSup();
  const W=700,pad=50,beamY=110,bL=W-2*pad;
  let s=`<style>text{font-family:'JetBrains Mono',monospace;font-size:10px;fill:#7a7f95}</style>`;
  s+=`<line x1="${pad}" y1="${beamY}" x2="${pad+bL}" y2="${beamY}" stroke="#2563eb" stroke-width="3"/>`;

  if(sup==='cantilever'){
    // Fixed support at left
    s+=`<line x1="${pad}" y1="${beamY-16}" x2="${pad}" y2="${beamY+16}" stroke="#2563eb" stroke-width="3"/>`;
    for(let i=-14;i<=14;i+=6) s+=`<line x1="${pad}" y1="${beamY+i}" x2="${pad-9}" y2="${beamY+i+5}" stroke="#2563eb" stroke-width="1"/>`;
    // Deflected shape - cantilever
    let pts=[];for(let i=0;i<=30;i++){const t=i/30;pts.push(`${pad+t*bL},${beamY+t*t*20+4}`);}
    s+=`<polyline points="${pts.join(' ')}" fill="none" stroke="#059669" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>`;
  } else {
    // Pin support left
    s+=`<polygon points="${pad-9},${beamY+16} ${pad+9},${beamY+16} ${pad},${beamY}" fill="#e8eaef" stroke="#2563eb" stroke-width="1.5"/>`;
    s+=`<line x1="${pad-12}" y1="${beamY+18}" x2="${pad+12}" y2="${beamY+18}" stroke="#2563eb" stroke-width="1.5"/>`;
    // Roller support right
    s+=`<polygon points="${pad+bL-9},${beamY+12} ${pad+bL+9},${beamY+12} ${pad+bL},${beamY}" fill="#e8eaef" stroke="#2563eb" stroke-width="1.5"/>`;
    s+=`<circle cx="${pad+bL}" cy="${beamY+16}" r="4" fill="#e8eaef" stroke="#2563eb" stroke-width="1.5"/>`;
    s+=`<line x1="${pad+bL-12}" y1="${beamY+22}" x2="${pad+bL+12}" y2="${beamY+22}" stroke="#2563eb" stroke-width="1.5"/>`;
    // Deflected shape - simply supported
    let pts=[];for(let i=0;i<=30;i++){const t=i/30;pts.push(`${pad+t*bL},${beamY+Math.sin(Math.PI*t)*16+5}`);}
    s+=`<polyline points="${pts.join(' ')}" fill="none" stroke="#059669" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>`;
  }

  // Span dimension
  s+=`<line x1="${pad}" y1="${beamY+32}" x2="${pad+bL}" y2="${beamY+32}" stroke="#c0c4d0" stroke-width="0.8"/>`;
  s+=`<line x1="${pad}" y1="${beamY+27}" x2="${pad}" y2="${beamY+37}" stroke="#c0c4d0" stroke-width="0.8"/>`;
  s+=`<line x1="${pad+bL}" y1="${beamY+27}" x2="${pad+bL}" y2="${beamY+37}" stroke="#c0c4d0" stroke-width="0.8"/>`;
  s+=`<text x="${pad+bL/2}" y="${beamY+48}" text-anchor="middle">${span} m</text>`;
  // Loads
  const grp={};
  ST.loads.forEach(l=>{if(l.val<=0)return;const k=l.cat+'_'+l.type;if(!grp[k])grp[k]={cat:l.cat,type:l.type,loads:[l]};else grp[k].loads.push(l);});
  let li=0;
  Object.values(grp).forEach(g=>{
    const col=catColors[g.cat];const yOff=beamY-35-li*30;const tv=g.loads.reduce((s,l)=>s+l.val,0);
    if(g.type==='udl'){
      const nA=10,sp=bL/(nA-1);
      for(let i=0;i<nA;i++){const x=pad+sp*i;s+=`<line x1="${x}" y1="${yOff+12}" x2="${x}" y2="${beamY-3}" stroke="${col}" stroke-width="1" opacity="0.6"/><polygon points="${x-2},${beamY-4} ${x+2},${beamY-4} ${x},${beamY-1}" fill="${col}"/>`;}
      s+=`<line x1="${pad}" y1="${yOff+12}" x2="${pad+bL}" y2="${yOff+12}" stroke="${col}" stroke-width="1"/>`;
      s+=`<text x="${pad+bL/2}" y="${yOff+6}" text-anchor="middle" fill="${col}" font-size="9" font-weight="600">${tv} kN/m (${g.cat})</text>`;
    } else {
      g.loads.forEach(l=>{let x=l.type==='point_mid'?pad+bL/2:pad+(l.pos/span)*bL;x=Math.max(pad,Math.min(pad+bL,x));
      s+=`<line x1="${x}" y1="${yOff}" x2="${x}" y2="${beamY-3}" stroke="${col}" stroke-width="1.5"/><polygon points="${x-3},${beamY-5} ${x+3},${beamY-5} ${x},${beamY}" fill="${col}"/>`;
      s+=`<text x="${x}" y="${yOff-5}" text-anchor="middle" fill="${col}" font-size="9" font-weight="600">${l.val} kN (${l.cat})</text>`;});
    }
    li++;
  });
  const neededH=Math.max(200,160+li*30);
  svg.setAttribute('viewBox',`0 0 ${W} ${neededH}`);
  svg.innerHTML=s;
}

// ===== MAIN CALCULATE =====
function calculate(){
  const span=parseFloat(document.getElementById('iSpan').value);
  const dSel=document.getElementById('iDefl').value;
  const dDiv=dSel==='custom'?parseFloat(document.getElementById('iDeflC').value):parseFloat(dSel);
  const E=getE(),fy=getFy();
  const dbF=document.getElementById('iDB').value;
  const inclSW=document.getElementById('iSW').checked;
  const sup=getSup();
  if(!span||span<=0){alert('Enter a valid span.');return;}
  if(ST.loads.length===0||ST.loads.every(l=>l.val<=0)){alert('Add at least one load with value > 0.');return;}
  const Lm=span,Lmm=span*1000,dLim=Lmm/dDiv;
  const userLoads=ST.loads.filter(l=>l.val>0).map(l=>({cat:l.cat,type:l.type,value:l.val,pos:l.pos}));
  let secs=SECTIONS;if(dbF!=='all')secs=secs.filter(s=>s.type===dbF);
  const sorted=[...secs].sort((a,b)=>a.kg-b.kg);
  const svcC=getSvc(),lrfdC=getLrfd();
  const results=[];
  sorted.forEach(sec=>{
    const I=sec.Iy*1e4,W=sec.Wel*1e3;
    const sw=inclSW?(sec.kg*9.81/1000):0;
    const loads=[...userLoads];if(inclSW)loads.push({cat:'D',type:'udl',value:sw,pos:0});
    // Governing service (max deflection)
    let maxD=0;svcC.forEach(c=>{const r=applyCombo(c,loads,Lmm,Lm,E,I,sup);if(r.d>maxD)maxD=r.d;});
    // Governing LRFD (max M, max V)
    let maxM=0,maxV=0;lrfdC.forEach(c=>{const r=applyCombo(c,loads,Lmm,Lm,E,I,sup);if(r.m>maxM)maxM=r.m;if(r.v>maxV)maxV=r.v;});
    const sigma=(maxM*1e6)/W;
    const Vrd=(sec.Av*100*fy)/(Math.sqrt(3)*1000);
    const dUtil=maxD/dLim*100,bUtil=sigma/fy*100,sUtil=maxV/Vrd*100;
    results.push({...sec,sw,maxD,maxM,maxV,sigma,Vrd,dUtil,bUtil,sUtil,
      dOK:maxD<=dLim,bOK:sigma<=fy,sOK:maxV<=Vrd,loads});
  });
  lastResults=results;lastDDiv=dDiv;
  lastCalc={Lm,Lmm,dLim,dDiv,E,fy,inclSW,userLoads,svcC,lrfdC,sup};
  renderResults();
}

// ===== DETAILED CALC SUMMARY =====
function buildCalc(idx){
  const cont=document.getElementById('calcCont');if(!cont)return;
  const s=lastResults[idx],C=lastCalc;
  const loads=s.loads; // includes SW for this section
  const svcC=C.svcC,lrfdC=C.lrfdC;
  const I=s.Iy*1e4,W=s.Wel*1e3;
  const Lmm=C.Lmm,Lm=C.Lm,E=C.E,fy=C.fy,dDiv=C.dDiv,sup=C.sup;
  const supLabel=sup==='cantilever'?'Cantilever':'Simply Supported';
  const secLabel=idx===0?`${s.name} (Lightest)`:`${s.name} (#${idx+1})`;

  // Per-combo breakdown
  let svcHTML='';
  let govSD=0,govSN='';
  svcC.forEach(c=>{const r=applyCombo(c,loads,Lmm,Lm,E,I,sup);const isG=r.d>govSD;if(isG){govSD=r.d;govSN=c.name;}
    svcHTML+=`<div class="combo-card${isG?' gov':''}"><div class="combo-lbl">${c.name}${isG?' ★':''}</div><div class="combo-val">${r.d.toFixed(2)} <span style="font-size:9px;color:var(--text3)">mm</span></div></div>`;});

  let lrfdHTML='';
  let govLM=0,govLMN='',govLV=0,govLVN='';
  lrfdC.forEach(c=>{const r=applyCombo(c,loads,Lmm,Lm,E,I,sup);if(r.m>govLM){govLM=r.m;govLMN=c.name;}if(r.v>govLV){govLV=r.v;govLVN=c.name;}
    lrfdHTML+=`<div class="combo-card${c.name===govLMN?' gov':''}"><div class="combo-lbl">${c.name}</div><div class="combo-val">${r.m.toFixed(1)} <span style="font-size:9px;color:var(--text3)">kNm</span></div></div>`;});

  // Load summary
  let loadHTML='';
  loads.forEach((l,i)=>{const isSW=C.inclSW&&i===loads.length-1;const lbl=isSW?'Self-Weight':`Load ${i+1}`;
    loadHTML+=`<div style="padding:3px 0;border-bottom:1px solid var(--bg4)">${lbl}: <span style="color:${catColors[l.cat]};font-weight:600">${l.cat}</span> — ${l.type.toUpperCase()} — <strong>${l.value.toFixed(l.value<1?4:2)} ${l.type==='udl'?'kN/m':'kN'}</strong>${l.type==='point_any'?' @ '+l.pos+'m':''}</div>`;});

  // Verification
  const Vrd=(s.Av*100*fy)/(Math.sqrt(3)*1000);
  const sigma=(govLM*1e6)/W;

  cont.innerHTML=`<div class="calc-wrap">
  <div class="sec-title collapsible" onclick="document.getElementById('calcBody').style.display=document.getElementById('calcBody').style.display==='none'?'block':'none'"><span class="dot" style="background:var(--accent)"></span>Detailed Calculation — ${secLabel}</div>
  <div id="calcBody">
    <div class="calc-block"><h4>① Input</h4>
    Support: <strong>${supLabel}</strong>, L = ${Lm} m = ${Lmm} mm<br>
    E = ${E.toLocaleString('en-US')} MPa, fy = ${fy} MPa<br>
    Deflection limit: L/${dDiv} = ${(Lmm/dDiv).toFixed(2)} mm</div>

    <div class="calc-block"><h4>② Applied Loads — ${s.name}</h4>${loadHTML}</div>

    <div class="calc-block"><h4>③ Service Combinations (Deflection)</h4>
    <div class="combo-grid">${svcHTML}</div>
    <div class="hl">Governing: <strong>${govSN}</strong> → δ = <strong>${govSD.toFixed(2)} mm</strong> vs limit ${(Lmm/dDiv).toFixed(2)} mm → <strong style="color:${s.dOK?'var(--green)':'var(--red)'}">${s.dOK?'OK':'FAIL'} (${s.dUtil.toFixed(1)}%)</strong></div></div>

    <div class="calc-block"><h4>④ LRFD Combinations (Strength)</h4>
    <div class="combo-grid">${lrfdHTML}</div>
    <div class="hl">Governing M: <strong>${govLMN}</strong> → M = <strong>${govLM.toFixed(2)} kNm</strong><br>
    σ = M/Wel = ${govLM.toFixed(2)}×10⁶ / ${W.toFixed(0)} = <strong>${sigma.toFixed(1)} MPa</strong> vs fy = ${fy} → <strong style="color:${s.bOK?'var(--green)':'var(--red)'}">${s.bOK?'OK':'FAIL'} (${s.bUtil.toFixed(0)}%)</strong><br>
    Governing V: <strong>${govLVN}</strong> → V = <strong>${govLV.toFixed(2)} kN</strong><br>
    V_Rd = Av·fy/√3 = ${s.Av}×100×${fy}/√3/1000 = <strong>${Vrd.toFixed(1)} kN</strong> → <strong style="color:${s.sOK?'var(--green)':'var(--red)'}">${s.sOK?'OK':'FAIL'} (${s.sUtil.toFixed(0)}%)</strong></div></div>
  </div></div>`;
}
